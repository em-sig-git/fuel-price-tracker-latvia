name: Daily Fuel Scrape

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: # Allows manual trigger in GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Run Scraper
        run: python main.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv logs/*.log
          git commit -m "Automated update: $(date -u)" || echo "No changes to commit"
          git push
