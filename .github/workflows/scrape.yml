name: Daily Fuel Scrape

on:
  schedule:
    - cron: "35 7 * * *"
    - cron: "45 9 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python src/fuel_price_tracker_latvia/main.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if compgen -G "data/*.csv" > /dev/null || compgen -G "logs/*.log" > /dev/null; then
            git add data/*.csv logs/*.log
            git commit -m "Automated update: $(date -u)" || echo "No changes to commit"
            git push
          else
            echo "No files to add"
          fi

